<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gers of Blud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script src="js/main.js" defer></script>
    <script src="js/menuInteractions.js" defer></script>
    <script src="js/keyListener.js" defer></script>
    <script src="js/gameLoop.js" defer></script>
    <script src="js/movementCalculations.js" defer></script>
    <script src="js/gameLogic.js" defer></script>
    <script src="js/bullets.js" defer></script>
    <script src="js/randomNumberGen.js" defer></script>
    <script src="js/enemys.js" defer></script>
    <script src="js/weapons.js" defer></script>
    <script src="js/collision.js" defer></script>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <div id="screen">
        <div id="main-menu-container">
            <div id="title-main-menu">
                Gears of Blood
            </div>
            <div id="play-story-button-main-menu" class="main-menu-button" onclick="enterStoryFromMainMenu()">
                Play Story
            </div>
            <div id="select-level-button-main-menu" class="main-menu-button" onclick="enterLevelSelectFromMainMenu()">
                Select Level
            </div>
            <div id="play-endless-button-main-menu" class="main-menu-button" onclick="enterEndlessFromMainMenu()">
                Play Endless
            </div>
            <div id="tutorial-button-main-menu" class="main-menu-button" onclick="enterTutorialFromMainMenu()">
                Tutorial
            </div>
            <div id="settings-button-main-menu" class="main-menu-button" onclick="enterSettingsFromMainMenu()">
                Settings
            </div>
        </div>
    </div>
</body>

</html>
